services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: simpledesk_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - pgsql
      - redis
    networks:
      - simpledesk

  nginx:
    image: nginx:1.27-alpine
    container_name: simpledesk_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - simpledesk

  pgsql:
    image: postgres:16-alpine
    container_name: simpledesk_pgsql
    environment:
      POSTGRES_DB: simpledesk
      POSTGRES_USER: simpledesk
      POSTGRES_PASSWORD: simpledesk
    ports:
      - "5433:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - simpledesk

  redis:
    image: redis:7-alpine
    container_name: simpledesk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - simpledesk

  mailpit:
    image: axllent/mailpit:latest
    container_name: simpledesk_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - simpledesk

volumes:
  pgsql_data:
  redis_data:

networks:
  simpledesk:
    driver: bridge